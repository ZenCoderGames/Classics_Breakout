<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breakout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center top, #1a1a2e 0%, #0f0f1b 70%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    #shell {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #hud {
      display: flex;
      align-items: stretch;
      gap: 12px;
    }

    .stat-panel {
      flex: 1;
      min-width: 120px;
      min-height: 76px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 16px;
      background: #1e1e2f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8e8e9e;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      color: #ffffff;
    }

    .lives-circles {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 28px;
    }

    .life-circle {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #8e8e9e;
      box-sizing: border-box;
      transition: transform 0.05s linear;
    }

    .life-circle.filled {
      background: #ffffff;
      border-color: #ffffff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
    }

    .life-circle.empty {
      background: transparent;
    }

    .life-circle.animating {
      background: transparent;
    }

    #title-panel {
      flex: 1.35;
      min-width: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      text-align: center;
    }

    #title-panel h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #ffffff;
    }

    #title-panel p {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 500;
      color: #8e8e9e;
    }

    #game-panel {
      padding: 12px;
      background: #1e1e2f;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      line-height: 0;
    }

    #game {
      display: block;
      border-radius: 6px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: none;
      touch-action: none;
    }

    #music-credit {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: #8e8e9e;
    }

    #music-credit a {
      color: #a8a8b8;
      text-decoration: none;
    }

    #music-credit a:hover {
      color: #ffffff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="hud">
      <div id="score-panel" class="stat-panel">
        <span class="stat-label">Score</span>
        <span id="score" class="stat-value">0</span>
      </div>
      <div id="title-panel">
        <h1>Breakout</h1>
        <p>A Classic</p>
      </div>
      <div id="lives-panel" class="stat-panel">
        <span class="stat-label">Lives</span>
        <div id="lives" class="lives-circles" aria-label="Lives"></div>
      </div>
    </div>
    <div id="game-panel">
      <canvas id="game" tabindex="0"></canvas>
    </div>
    <p id="music-credit">
      <a href="https://pixabay.com/music/modern-classical-puzzle-masters-rohit-valiant-402154/" target="_blank" rel="noopener noreferrer">Music</a>
    </p>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
